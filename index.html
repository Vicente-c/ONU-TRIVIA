
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trivia ONU</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    linear-gradient(180deg,#020617,#0f172a,#1e3a8a);
    color:white;
    overflow-x:hidden;
}


body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(rgba(255,255,255,0.05) 2px,transparent 2px);
    background-size:50px 50px;
    z-index:-1;
    animation:fondo 30s linear infinite;
}

@keyframes fondo{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-200px);
    }
}

header{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

header h1{
    font-size:4rem;
    color:#93c5fd;
    margin-bottom:20px;
}

header p{
    max-width:700px;
    line-height:1.8;
    color:#cbd5e1;
    font-size:1.2rem;
}

.scroll{
    margin-top:40px;
    font-size:3rem;
    animation:subir 1s infinite alternate;
}

@keyframes subir{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(12px);
    }
}

.container{
    width:100%;
    max-width:950px;
    margin:auto;
    padding:40px 20px 100px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:35px;
    margin-bottom:40px;
    opacity:0;
    transform:translateY(80px);
    transition:0.8s;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.question-number{
    color:#38bdf8;
    margin-bottom:10px;
    font-weight:600;
}

.question{
    font-size:1.7rem;
    margin-bottom:25px;
    line-height:1.5;
}

.answers{
    display:grid;
    gap:15px;
}

.answer-btn{
    background:rgba(255,255,255,0.08);
    border:none;
    padding:18px;
    border-radius:16px;
    color:white;
    text-align:left;
    font-size:1rem;
    cursor:pointer;
    transition:0.25s;
    border:1px solid rgba(255,255,255,0.1);
}

.answer-btn:hover{
    transform:translateX(8px);
    background:#2563eb;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

.answer-btn:disabled{
    cursor:not-allowed;
    opacity:0.9;
}

.result{
    text-align:center;
    padding:80px 20px;
}

.result h2{
    font-size:3rem;
    margin-bottom:20px;
    color:#93c5fd;
}

.result p{
    font-size:1.5rem;
    margin-bottom:30px;
}

.finish-btn{
    background:linear-gradient(90deg,#38bdf8,#2563eb);
    border:none;
    color:white;
    padding:18px 40px;
    border-radius:18px;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

.finish-btn:hover{
    transform:scale(1.05);
}

@media(max-width:700px){

    header h1{
        font-size:2.8rem;
    }

    .question{
        font-size:1.3rem;
    }

    .card{
        padding:25px;
    }

}

</style>
</head>

<body>

<header>

    <h1>🌍 Trivia ONU</h1>

    <p>
        Poné a prueba tus conocimientos sobre Naciones Unidas,
        diplomacia y Modelo ONU.
        Bajá y respondé todas las preguntas para descubrir
        qué tan preparado estás para representar a tu país.
    </p>

    <div class="scroll">↓</div>

</header>

<div class="container" id="quizContainer"></div>

<div class="result">
    <h2>🏆 Resultado Final</h2>
    <p id="scoreText">Tu puntaje aparecerá aquí</p>

    <button class="finish-btn" onclick="showScore()">
        Ver Puntaje
    </button>
</div>

<script>

const questions = [

{
question:"¿Qué significa ONU?",
answers:[
["Organización Nacional Universal",false],
["Organización de Naciones Unidas",true],
["Orden de Naciones Unidas",false],
["Organización Neutral Universal",false]
]
},

{
question:"¿En qué año fue creada la ONU?",
answers:[
["1919",false],
["1939",false],
["1945",true],
["1950",false]
]
},

{
question:"¿Cuál es el principal objetivo de la ONU?",
answers:[
["Organizar elecciones",false],
["Mantener la paz y seguridad internacional",true],
["Controlar la economía mundial",false],
["Crear leyes nacionales",false]
]
},

{
question:"¿Dónde está la sede principal de la ONU?",
answers:[
["Ginebra",false],
["París",false],
["Nueva York",true],
["Londres",false]
]
},

{
question:"¿Quién es el actual Secretario General de la ONU?",
answers:[
["Ban Ki-moon",false],
["António Guterres",true],
["Joe Biden",false],
["Emmanuel Macron",false]
]
},

{
question:"¿Qué es un Modelo de Naciones Unidas (MNU)?",
answers:[
["Un videojuego político",false],
["Una actividad educativa de debate y representación diplomática",true],
["Una conferencia militar",false],
["Una organización estudiantil obligatoria",false]
]
},

{
question:"¿Qué hacen los delegados?",
answers:[
["Representan a un país en un órgano específico",true],
["Organizan fiestas",false],
["Manejan las votaciones globales",false],
["Dirigen toda la ONU",false]
]
},

{
question:"¿Cuál es la función del embajador?",
answers:[
["Llevar asistencia",false],
["Coordinar a la delegación y conocer profundamente al país",true],
["Hacer discursos únicamente",false],
["Ser ujier",false]
]
},

{
question:"¿Qué hacen los ujieres?",
answers:[
["Controlan las votaciones",false],
["Representan países",false],
["Transmiten pedidos entre delegados y Presidencia",true],
["Dirigen el debate",false]
]
},

{
question:"¿Qué órgano trata temas de derechos fundamentales?",
answers:[
["ECOSOC",false],
["Consejo de Derechos Humanos",true],
["Consejo de Seguridad",false],
["ONU Mujeres",false]
]
},

{
question:"¿Qué significa ECOSOC?",
answers:[
["Consejo Económico y Social",true],
["Comité Económico Social",false],
["Consejo Estratégico Social",false],
["Comisión Económica Social",false]
]
},

{
question:"¿Qué temas trata ECOSOC?",
answers:[
["Conflictos bélicos",false],
["Temas económicos, sociales y ambientales",true],
["Deportes internacionales",false],
["Elecciones nacionales",false]
]
},

{
question:"¿Qué hace la UNODC?",
answers:[
["Controla escuelas",false],
["Lucha contra drogas ilícitas y delincuencia",true],
["Organiza tratados climáticos",false],
["Supervisa internet",false]
]
},

{
question:"¿Cuál es la función principal del Consejo de Seguridad?",
answers:[
["Crear constituciones",false],
["Mantener la paz y seguridad internacional",true],
["Administrar economías",false],
["Defender empresas",false]
]
},

{
question:"¿Cuántos miembros permanentes tiene el Consejo de Seguridad?",
answers:[
["3",false],
["5",true],
["10",false],
["15",false]
]
},

{
question:"¿Qué país NO es miembro permanente?",
answers:[
["China",false],
["Rusia",false],
["Estados Unidos",false],
["Japón",true]
]
},

{
question:"¿Cómo se llama la etapa donde los países dan su discurso?",
answers:[
["Caucus",false],
["Lista de oradores",true],
["Debate cerrado",false],
["Comisión especial",false]
]
},

{
question:"Verdadero o falso: “Los países deben levantar el cartel para pedir la palabra.”",
answers:[
["Verdadero",true],
["Falso",false]
]
},

{
question:"¿Qué organización trabaja por la igualdad de género?",
answers:[
["ECOSOC",false],
["ONU Mujeres",true],
["UNODC",false],
["Asamblea General",false]
]
},

{
question:"¿Qué órgano tiene representación universal de los 193 Estados miembros?",
answers:[
["Asamblea General",true],
["Consejo de Seguridad",false],
["ONU Mujeres",false],
["ECOSOC",false]
]
}

];

const container = document.getElementById("quizContainer");

let score = 0;

questions.forEach((q,index)=>{

    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <div class="question-number">
            Pregunta ${index+1}
        </div>

        <div class="question">
            ${q.question}
        </div>

        <div class="answers">
            ${q.answers.map(answer => `
                <button class="answer-btn">
                    ${answer[0]}
                </button>
            `).join('')}
        </div>
    `;

    container.appendChild(card);

    const buttons = card.querySelectorAll(".answer-btn");

    buttons.forEach((button,i)=>{

        button.addEventListener("click",()=>{

            if(card.classList.contains("answered")) return;

            card.classList.add("answered");

            const correct = q.answers[i][1];

            if(correct){
                score++;
                button.classList.add("correct");
            }else{
                button.classList.add("wrong");
            }

            buttons.forEach((btn,j)=>{

                if(q.answers[j][1]){
                    btn.classList.add("correct");
                }

                btn.disabled = true;

            });

        });

    });

});


const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver(entries=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }

    });

},{threshold:0.15});

cards.forEach(card=>{
    observer.observe(card);
});

function showScore(){

    document.getElementById("scoreText").innerHTML =
    `Obtuviste <strong>${score}</strong> de <strong>${questions.length}</strong> respuestas correctas 🎉`;

}

</script>

</body>
</html>
